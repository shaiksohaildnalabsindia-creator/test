<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Scanner</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <!-- Link our centralized CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Sidebar Container (Injected via JS) -->
<div id="sidebar-container"></div>

<!-- Main Content -->
<div class="main-content" id="mainContent">
  <!-- Topbar -->
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
      ☰
    </button>
    <div class="page-info">
      <div class="page-title">
        <span>📦</span>
        <span>Parcel Scanner</span>
      </div>
      <div class="page-subtitle">Select courier and parcel count to start scanning</div>
    </div>
  </header>

  <!-- Form Content -->
  <div class="form-wrapper">
    <div class="form-container">
      <h2>Parcel Scanner</h2>
    </div>

    <div  
      <form id="parcelForm">
        <div class="form-group">
          <label for="courier">Parcels From:</label>
          <select id="courier" required>
            <option value="" disabled selected>Select Courier</option>
            <option value="Bluedart">Bluedart</option>
            <option value="FedEx">FedEx</option>
            <option value="DTDC">DTDC</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div class="form-group">
          <label for="count">Parcel Count:</label>
          <select id="count" required>
            <option value="" disabled selected>Select Count</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
          </select>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span>🚚</span>
          <span>Start Scanning</span>
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<!-- Load our config and sidebar scripts -->
<script src="config.js"></script>
<script src="sidebar.js"></script>

<script>
// DOM Elements
const parcelForm = document.getElementById('parcelForm');
const submitBtn = document.getElementById('submitBtn');
const toast = document.getElementById('toast');
const courierSelect = document.getElementById('courier');
const countSelect = document.getElementById('count');

// Show toast notification
function showToast(message, type = 'success') {
  toast.textContent = message;
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `
    <span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>
    <span>${message}</span>
  `;
  toast.classList.add('show');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Form submission
parcelForm.addEventListener("submit", async function(e){
  e.preventDefault();
  
  const courier = courierSelect.value;
  const count = countSelect.value;

  if(!courier || !count){
    showToast("Please select courier and parcel count", 'error');
    return;
  }

  // Show loading state
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading-spinner"></span><span>Processing...</span>';

  try {
    // Send data to the backend using the config file variable
    await fetch(CONFIG.SCANNER_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        page: "page1", 
        courier, 
        count 
      }),
      mode: "no-cors"
    });

    // Show success message
    showToast(`Starting scanning for ${count} ${courier} parcels`, 'success');
    
    // Wait a moment for user to see the message
    setTimeout(() => {
      // Redirect to the barcode scanner page
      window.location.href = `scanner_camera.html?courier=${encodeURIComponent(courier)}&count=${count}`;
    }, 1000);
    
  } catch (error) {
    console.error('Error:', error);
    showToast("Error submitting form. Please try again.", 'error');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span>🚚</span><span>Start Scanning</span>';
  }
});

// Add keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + Enter to submit
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    parcelForm.requestSubmit();
  }
});

// Focus on first select when page loads
window.addEventListener('load', () => {
  courierSelect.focus();
});
</script>

</body>
</html>
