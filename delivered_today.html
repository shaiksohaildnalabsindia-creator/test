<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Delivered Parcels</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ---------- PAGE SPECIFIC STYLES ---------- */
    .content-wrapper { flex: 1; padding: 30px; background: #f8fafc; overflow-y: auto; }
    .content-container { width: 100%; max-width: 1200px; margin: 0 auto; background: #ffffff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); overflow: hidden; border: 1px solid #e2e8f0; }
    .header { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header-content { flex: 1; }
    .header h2 { font-size: 24px; font-weight: 600; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; margin: 0; }
    
    .stats-card { background: rgba(255, 255, 255, 0.2); padding: 15px 20px; border-radius: 10px; text-align: center; min-width: 150px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .stats-count { font-size: 28px; font-weight: 700; margin-bottom: 5px; display: block; }
    .stats-label { font-size: 12px; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ---------- TABLE STYLES ---------- */
    .table-container { padding: 30px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #e5e7eb; }
    th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #f3f4f6; transition: background-color 0.2s; }
    th { background: #f9fafb; font-weight: 600; color: #374151; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
    td { color: #4b5563; font-size: 14px; }
    tr:hover td { background: #f9fafb; }
    tr:last-child td { border-bottom: none; }

    /* Status badge */
    .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; display: inline-block; min-width: 90px; text-align: center; }
    .status-delivered { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status-pending { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .status-unknown { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

    /* Tracking link */
    .tracking-link { color: #3b82f6; text-decoration: none; font-weight: 500; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; background: #eff6ff; border: 1px solid transparent; }
    .tracking-link:hover { background: #dbeafe; border-color: #3b82f6; transform: translateY(-1px); box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1); }
    .tracking-link::after { content: '👁️'; opacity: 0.7; font-size: 12px; }

    /* Loading & Empty state */
    .loading-container { padding: 40px; text-align: center; color: #6b7280; }
    .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #e5e7eb; border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { padding: 60px 20px; text-align: center; color: #9ca3af; }
    .empty-icon { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }

    .cache-indicator { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; background: #f3f4f6; color: #6b7280; vertical-align: middle; }
    .cache-indicator.fresh { background: #d1fae5; color: #065f46; }

    /* ---------- MODAL & GALLERY ---------- */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 999; padding: 20px; }
    .modal.show { display: flex; animation: fadeIn 0.3s ease; }
    .modal-content { position: relative; max-width: 95vw; max-height: 95vh; overflow: auto; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; }
    
    .gallery { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px; width: 100%; }
    .gallery img { max-width: 80vw; max-height: 80vh; object-fit: contain; border-radius: 8px; cursor: zoom-in; display: block; transition: transform 0.2s, opacity 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .gallery img:hover { transform: scale(1.01); }

    .img-container { position: relative; display: inline-block; min-width: 200px; min-height: 150px; border-radius: 8px; overflow: hidden; }
    @keyframes loading { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
    .loading-placeholder { position: absolute; width: 100%; height: 100%; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; }
    .modal-loading { color: white; font-size: 18px; padding: 30px; text-align: center; }
    .error-message { color: #f87171; background: rgba(254, 226, 226, 0.1); padding: 20px; border-radius: 8px; text-align: center; margin: 20px; border: 1px solid rgba(254, 226, 226, 0.2); }

    /* ---------- FULLSCREEN ---------- */
    .fullscreen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; overflow: hidden; touch-action: none; }
    .fullscreen.show { display: flex; animation: fadeIn 0.3s ease; }
    .fullscreen img { max-width: 95vw; max-height: 95vh; object-fit: contain; cursor: grab; transition: transform 0.1s ease-out; transform-origin: center center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    
    .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2001; transition: all 0.2s; backdrop-filter: blur(10px); }
    .nav-arrow:hover { background: rgba(255,255,255,0.25); transform: translateY(-50%) scale(1.1); }
    .nav-arrow.prev { left: 20px; } .nav-arrow.next { right: 20px; }
    
    .close-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.15); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 2001; transition: all 0.2s; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .close-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
    
    .info-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 2001; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px; }

    /* ---------- REFRESH BUTTON ---------- */
    .refresh-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 768px) {
      .content-wrapper { padding: 15px; }
      .header { padding: 20px; flex-direction: column; align-items: stretch; }
      .stats-card { align-self: flex-start; }
      .table-container { padding: 15px; }
      th, td { padding: 12px 15px; font-size: 13px; }
      .nav-arrow { width: 50px; height: 50px; font-size: 24px; }
      .close-btn { width: 40px; height: 40px; font-size: 20px; }
      .refresh-btn { width: 100%; margin-top: 10px; justify-content: center; }
    }
  </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
    <div class="page-info">
      <div class="page-title">
        <span>📦</span>
        <span>Today's Delivered Parcels</span>
        <span id="cacheIndicator" class="cache-indicator" style="display: none;"></span>
      </div>
      <div class="page-subtitle">View all parcels delivered today with images</div>
    </div>
    <div class="user-menu">
      <button class="refresh-btn" onclick="forceRefresh()">
        <span>🔄</span>
        <span>Refresh</span>
      </button>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="content-container">
      <span id="count" style="display: none;"></span>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Tracking Number</th>
              <th>From Address</th>
              <th>Delivery Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="4">
                <div class="loading-container">
                  <div class="loading-spinner"></div>
                  <div>Loading today's deliveries...</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="imageModal" class="modal">
  <button class="close-btn" onclick="closeModal()" aria-label="Close modal">×</button>
  <div class="modal-content">
    <div class="gallery" id="gallery"></div>
  </div>
</div>

<div id="fullscreen" class="fullscreen">
  <button class="close-btn" onclick="closeFullscreen()" aria-label="Close fullscreen">×</button>
  <button class="nav-arrow prev" onclick="prevImage()" aria-label="Previous image">‹</button>
  <button class="nav-arrow next" onclick="nextImage()" aria-label="Next image">›</button>
  <div class="info-panel" id="infoPanel">
    <span id="imageCounter">1/1</span>
    <span>•</span>
    <span id="imageCaption">Image</span>
  </div>
  <img id="fsImage" src="" alt="Fullscreen view">
</div>

<script src="config.js"></script>
<script src="auth.js"></script>  
<script src="sidebar.js"></script>

<script>
/* ---------- CACHE SETTINGS ---------- */
const CACHE_KEY = 'parcel_pro_delivered_today';
const CACHE_DURATION = 5 * 60 * 1000; // 5 minutes cache

/* ---------- DOM ELEMENTS ---------- */
const imageModal = document.getElementById("imageModal");
const gallery = document.getElementById("gallery");
const fullscreen = document.getElementById("fullscreen");
const fsImage = document.getElementById("fsImage");
const tableBody = document.getElementById("tableBody");
const countElement = document.getElementById("count");
const toast = document.getElementById('toast');
const imageCounter = document.getElementById('imageCounter');
const imageCaption = document.getElementById('imageCaption');
const cacheIndicator = document.getElementById('cacheIndicator');

/* ---------- GLOBAL VARIABLES ---------- */
let currentImages = [];
let currentIndex = 0;
let dataRefreshInterval = null;
let isLoading = false;
let parcelData = [];
let memoryCache = null;
let isFromCache = false;

/* ---------- TOAST FUNCTION ---------- */
function showToast(message, type = 'success') {
  toast.textContent = message;
  toast.className = `toast toast-${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ---------- CACHE FUNCTIONS ---------- */
function saveToCache(data) {
  const cacheData = { data: data, timestamp: Date.now() };
  localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
  memoryCache = cacheData;
}

function getFromCache() {
  if (memoryCache && memoryCache.timestamp) {
    if ((Date.now() - memoryCache.timestamp) <= CACHE_DURATION) return memoryCache.data;
    memoryCache = null;
  }
  
  const cached = localStorage.getItem(CACHE_KEY);
  if (!cached) return null;
  
  try {
    const parsed = JSON.parse(cached);
    if ((Date.now() - parsed.timestamp) > CACHE_DURATION) {
      localStorage.removeItem(CACHE_KEY);
      return null;
    }
    memoryCache = parsed;
    return parsed.data;
  } catch (e) {
    localStorage.removeItem(CACHE_KEY);
    return null;
  }
}

function clearCache() {
  memoryCache = null;
  localStorage.removeItem(CACHE_KEY);
  showToast('Cache cleared', 'info');
}

function updateCacheIndicator(isCached) {
  isFromCache = isCached;
  if (isCached) {
    cacheIndicator.style.display = 'inline-block';
    cacheIndicator.textContent = 'Cached';
    cacheIndicator.className = 'cache-indicator fresh';
  } else {
    cacheIndicator.style.display = 'inline-block';
    cacheIndicator.textContent = 'Live';
    cacheIndicator.className = 'cache-indicator';
  }
}

/* ---------- DATA LOADING ---------- */
function loadData(forceRefresh = false) {
  if (isLoading && !forceRefresh) return;
  
  if (!forceRefresh) {
    const cachedData = getFromCache();
    if (cachedData) {
      parcelData = cachedData;
      displayData(parcelData);
      updateCacheIndicator(true);
      showToast(`Loaded ${parcelData.length} deliveries from cache`, 'info');
      
      const cacheAge = Date.now() - (memoryCache?.timestamp || 0);
      if (cacheAge > 60000) setTimeout(() => loadData(true), 1000);
      return;
    }
  }
  
  isLoading = true;
  updateCacheIndicator(false);
  
  tableBody.innerHTML = `
    <tr>
      <td colspan="4">
        <div class="loading-container">
          <div class="loading-spinner"></div>
          <div>${forceRefresh ? 'Refreshing deliveries...' : 'Loading today\'s deliveries...'}</div>
        </div>
      </td>
    </tr>
  `;
  countElement.textContent = "0";
  
  // Using JSONP as in the original code, but with CONFIG variable
  const script = document.createElement("script");
  script.src = CONFIG.DELIVERED_TODAY_API + "?callback=handleData&t=" + Date.now();
  script.id = "jsonpScript";
  script.onerror = handleDataError;
  
  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();
  
  document.body.appendChild(script);
}

function handleDataError() {
  isLoading = false;
  const cachedData = getFromCache();
  if (cachedData) {
    parcelData = cachedData;
    displayData(parcelData);
    updateCacheIndicator(true);
    showToast(`Showing cached data (offline mode)`, 'info');
    return;
  }
  
  tableBody.innerHTML = `
    <tr>
      <td colspan="4">
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div>Failed to load data. Please try again.</div>
          <button onclick="forceRefresh()" class="refresh-btn" style="margin-top: 15px;">
            <span>🔄</span><span>Retry</span>
          </button>
        </div>
      </td>
    </tr>`;
  showToast('Failed to load parcel data', 'error');
}

// Called directly by JSONP response
function handleData(data) {
  isLoading = false;
  parcelData = Array.isArray(data) ? data : [];
  saveToCache(parcelData);
  displayData(parcelData);
  
  if (isFromCache) showToast(`Refreshed ${parcelData.length} deliveries`, 'success');
  else showToast(`Loaded ${parcelData.length} deliveries`, 'success');
}

function displayData(data) {
  countElement.textContent = data.length;
  tableBody.innerHTML = '';
  
  if (data.length === 0) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="4">
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <div>No deliveries found for today.</div>
            <div style="font-size: 13px; margin-top: 10px; opacity: 0.7;">Check back later</div>
          </div>
        </td>
      </tr>`;
    return;
  }
  
  data.forEach(parcel => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <a class="tracking-link" onclick="openModal('${parcel.trackingNumber}')" title="View images for ${parcel.trackingNumber}">
          ${parcel.trackingNumber}
        </a>
      </td>
      <td>${parcel.fromAddress || 'N/A'}</td>
      <td>${formatDate(parcel.deliveryDate) || 'Today'}</td>
      <td><span class="status-badge ${getStatusClass(parcel.status)}">${parcel.status || 'Unknown'}</span></td>
    `;
    tableBody.appendChild(tr);
  });
}

function getStatusClass(status) {
  if (!status) return 'status-unknown';
  const s = status.toLowerCase();
  if (s.includes('delivered')) return 'status-delivered';
  if (s.includes('pending')) return 'status-pending';
  return 'status-unknown';
}

function formatDate(dateString) {
  if (!dateString) return '';
  try { return new Date(dateString).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); } 
  catch (e) { return dateString; }
}

/* ---------- IMAGE CACHING & FETCHING ---------- */
function getImageCacheKey(tracking) { return `parcel_pro_images_${tracking}`; }

function saveImagesToCache(tracking, images) {
  localStorage.setItem(getImageCacheKey(tracking), JSON.stringify({ data: images, timestamp: Date.now() }));
}

function getImagesFromCache(tracking) {
  const cached = localStorage.getItem(getImageCacheKey(tracking));
  if (!cached) return null;
  try {
    const parsed = JSON.parse(cached);
    if ((Date.now() - parsed.timestamp) > CACHE_DURATION) {
      localStorage.removeItem(getImageCacheKey(tracking));
      return null;
    }
    return parsed.data;
  } catch (e) {
    localStorage.removeItem(getImageCacheKey(tracking));
    return null;
  }
}

function openModal(tracking) {
  imageModal.classList.add("show");
  const cachedImages = getImagesFromCache(tracking);
  
  if (cachedImages) {
    renderImages(cachedImages, tracking, true);
    return;
  }
  
  gallery.innerHTML = `<div class="modal-loading">Loading images for ${tracking}...</div>`;
  fetchImages(tracking.toLowerCase());
}

function closeModal() {
  imageModal.classList.remove("show");
  gallery.innerHTML = "";
  currentImages = [];
}

async function fetchImages(query) {
  try {
    // Uses the new config variable
    const response = await fetch(CONFIG.IMAGE_API + `?t=${Date.now()}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    saveImagesToCache(query, data);
    renderImages(data, query, false);
  } catch (error) {
    const cachedImages = getImagesFromCache(query);
    if (cachedImages) {
      renderImages(cachedImages, query, true);
      showToast('Showing cached images', 'info');
      return;
    }
    gallery.innerHTML = `
      <div class="error-message">
        <p>Failed to load images. Please try again.</p>
        <button onclick="fetchImages('${query}')" class="refresh-btn" style="margin-top: 10px;">
          <span>🔄</span><span>Retry</span>
        </button>
      </div>`;
  }
}

function renderImages(data, query, fromCache = false) {
  gallery.innerHTML = "";
  if (!Array.isArray(data)) {
    gallery.innerHTML = `<div class="error-message">Invalid image data format.</div>`;
    return;
  }
  
  currentImages = data.filter(item => item.caption && item.caption.toLowerCase().includes(query.toLowerCase()));
  
  if (currentImages.length === 0) {
    gallery.innerHTML = `<div class="error-message">No images found for tracking number: <strong>${query.toUpperCase()}</strong></div>`;
    return;
  }
  
  if (fromCache) {
    gallery.innerHTML = `<div class="modal-loading">Loading ${currentImages.length} cached image(s)...</div>`;
    setTimeout(() => {
      gallery.innerHTML = "";
      currentImages.forEach((item, index) => createImageElement(item, index, 'loaded'));
    }, 300);
  } else {
    gallery.innerHTML = `<div class="modal-loading">Preloading ${currentImages.length} image(s)...</div>`;
    const promises = currentImages.map((item, index) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = item.url;
        img.onload = () => resolve({ index, item, status: 'loaded' });
        img.onerror = () => resolve({ index, item, status: 'error' });
      });
    });

    Promise.all(promises).then((results) => {
      gallery.innerHTML = "";
      results.forEach((result, index) => createImageElement(result.item, index, result.status));
    });
  }
}

function createImageElement(item, index, status = 'loaded') {
  const container = document.createElement("div");
  container.className = "img-container";
  
  const placeholder = document.createElement("div");
  placeholder.className = "loading-placeholder";
  container.appendChild(placeholder);
  
  const img = document.createElement("img");
  img.style.cssText = "width: 100%; height: 100%; max-width: 400px; max-height: 300px; object-fit: contain; cursor: pointer; border-radius: 8px; opacity: 0; transition: opacity 0.3s ease;";
  img.src = item.url;
  img.alt = item.caption || `Image ${index + 1}`;
  
  const finishLoading = () => {
    img.style.opacity = "1";
    placeholder.style.display = "none";
    if (item.caption) {
      const cap = document.createElement("div");
      cap.style.cssText = "color: white; text-align: center; font-size: 13px; margin-top: 8px; word-break: break-word; max-width: 400px;";
      cap.textContent = item.caption.length > 40 ? item.caption.substring(0, 40) + "..." : item.caption;
      container.appendChild(cap);
    }
  };

  if (status === 'loaded') {
    finishLoading();
  } else {
    img.onload = finishLoading;
    img.onerror = () => {
      placeholder.style.display = "none";
      const err = document.createElement("div");
      err.style.cssText = "width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fee; border: 2px dashed #f87171; border-radius: 8px; color: #dc2626; font-size: 12px; padding: 10px; text-align: center;";
      err.textContent = "Failed to load image";
      container.appendChild(err);
    };
  }
  
  img.onclick = (e) => { e.stopPropagation(); openFullscreen(index); };
  container.appendChild(img);
  gallery.appendChild(container);
}

/* ---------- FULLSCREEN VIEW ---------- */
let scale = 1, translateX = 0, translateY = 0, isDragging = false, startX = 0, startY = 0;

function openFullscreen(index) {
  if (!currentImages[index]) return;
  currentIndex = index;
  fsImage.src = currentImages[index].url;
  imageCounter.textContent = `${index + 1}/${currentImages.length}`;
  imageCaption.textContent = currentImages[index].caption || `Image ${index + 1}`;
  scale = 1; translateX = 0; translateY = 0; updateTransform();
  fullscreen.classList.add("show");
}

function closeFullscreen() {
  fullscreen.classList.remove("show");
  fsImage.src = "";
  scale = 1; translateX = 0; translateY = 0; updateTransform();
}

function prevImage() {
  if (!currentImages.length) return;
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
  openFullscreen(currentIndex);
}

function nextImage() {
  if (!currentImages.length) return;
  currentIndex = (currentIndex + 1) % currentImages.length;
  openFullscreen(currentIndex);
}

function updateTransform() { fsImage.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`; }

imageModal.addEventListener('click', (e) => { if (e.target === imageModal) closeModal(); });
fullscreen.addEventListener('click', (e) => { if (e.target === fullscreen) closeFullscreen(); });

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (fullscreen.classList.contains("show")) closeFullscreen();
    else if (imageModal.classList.contains("show")) closeModal();
  } else if (fullscreen.classList.contains("show")) {
    if (e.key === "ArrowLeft") prevImage();
    else if (e.key === "ArrowRight") nextImage();
  }
});

fsImage.addEventListener("wheel", e => {
  e.preventDefault();
  const newScale = Math.min(Math.max(1, scale - e.deltaY * 0.001), 5);
  const rect = fsImage.getBoundingClientRect();
  translateX -= (e.clientX - rect.left - rect.width / 2) * (newScale - scale);
  translateY -= (e.clientY - rect.top - rect.height / 2) * (newScale - scale);
  scale = newScale; updateTransform();
});

fsImage.addEventListener("mousedown", e => {
  if (scale <= 1) return;
  isDragging = true;
  startX = e.clientX - translateX; startY = e.clientY - translateY;
  fsImage.style.cursor = "grabbing";
  e.preventDefault();
});

document.addEventListener("mousemove", e => {
  if (!isDragging) return;
  translateX = e.clientX - startX; translateY = e.clientY - startY;
  updateTransform();
});

document.addEventListener("mouseup", () => { isDragging = false; fsImage.style.cursor = "grab"; });
fsImage.addEventListener("dblclick", e => { e.preventDefault(); scale = 1; translateX = 0; translateY = 0; updateTransform(); });

function forceRefresh() { loadData(true); }

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && memoryCache && (Date.now() - memoryCache.timestamp) > 120000) loadData(true);
});

window.addEventListener('load', () => {
  loadData();
  window.addEventListener('beforeunload', () => { if (dataRefreshInterval) clearInterval(dataRefreshInterval); });
});

window.app = { loadData: (force) => loadData(force), clearCache, openModal, closeModal, openFullscreen, closeFullscreen, prevImage, nextImage, getCacheInfo: () => ({ hasCache: !!getFromCache(), itemCount: getFromCache() ? getFromCache().length : 0, memoryCache: memoryCache, isFromCache }) };
</script>
</body>
</html>
