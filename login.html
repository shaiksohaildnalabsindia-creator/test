<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Parcel Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="auth.js"></script>
    
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f4f6f8 0%, #e9ecef 100%);
            width: 100%;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .login-card h2 {
            margin-bottom: 5px;
            color: #1e293b;
        }
        .login-card p {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-btn {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">📦</div>
        <h2>Parcel Pro</h2>
        <p>Sign in to manage your deliveries</p>

        <form id="loginForm">
            <div class="form-group" style="text-align: left;">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="error-message" id="loginError" style="margin-bottom: 15px;"></div>

            <button type="submit" class="submit-btn login-btn" id="loginBtn">
                <span>🔐</span><span>Sign In</span>
            </button>
        </form>
    </div>
</div>

<script src="config.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');

        // Reset state
        errorDiv.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading-spinner"></span><span>Verifying...</span>';

        try {
            const response = await fetch(CONFIG.AUTH_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username: username, password: password })
            });

            const data = await response.json();

            if (data.success) {
                // Save the token, username, AND the exact login timestamp
                localStorage.setItem('parcel_pro_token', data.token || 'authenticated');
                localStorage.setItem('parcel_pro_user', username);
                localStorage.setItem('parcel_pro_login_time', Date.now().toString()); // NEW!
                
                // Redirect to dashboard
                window.location.href = 'index.html';
            } else {
                throw new Error(data.message || "Invalid credentials");
            }
        } catch (err) {
            errorDiv.textContent = err.message || "Failed to connect to server";
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<span>🔐</span><span>Sign In</span>';
        }
    });
</script>
</body>
</html>
